replicaCount: 1

# Identifier passed to --identifier. Useful to expose multiple observation sites.
identifier: massivepinger

image:
  repository: ghcr.io/danielricart/massivepinger
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9123

# List of ping targets rendered into the ConfigMap as config.yaml.
# Example:
# config:
#   - target: 8.8.8.8
#     interval: 5s
#     timeout: 1s
#   - target: 1.1.1.1
#     interval: 10s
#     timeout: infinite
config: []

serviceMonitor:
  # Enable to create a Prometheus Operator ServiceMonitor for scraping metrics.
  # Requires the prometheus-operator CRDs to be installed in the cluster.
  enabled: false
  # namespace: ""  # defaults to release namespace
  interval: 30s
  scrapeTimeout: 10s
  # Additional labels to add to the ServiceMonitor (e.g. to match a Prometheus
  # instance's serviceMonitorSelector).
  labels: {}
  # Relabelings applied to the scrape target before ingestion.
  # Useful for adding static labels or renaming target labels.
  # relabelings:
  #   - targetLabel: cluster
  #     replacement: my-cluster
  #   - sourceLabels: [__meta_kubernetes_pod_node_name]
  #     targetLabel: node
  # Relabelings applied to each metric series after scraping.
  # Useful for adding, renaming, or dropping labels on individual metrics.
  # metricRelabelings:
  #   - targetLabel: env
  #     replacement: production
  #   - sourceLabels: [__name__]
  #     regex: "go_.*"
  #     action: drop

resources: {}
#   requests:
#     memory: "8Mi"
#     cpu: "25m"
#   limits:
#     memory: "16Mi"
#     cpu: "50m"

nodeSelector: {}

tolerations: []

affinity: {}
