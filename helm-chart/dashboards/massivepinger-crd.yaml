        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    spec:
                      app: grafana-assistant-app
                      expr: >-
                        sum by(target)
                        (rate(icmp_received_count{target=~"$target",
                        identifier=~"$identifier"}[$__rate_interval])) / sum
                        by(target) (rate(icmp_sent_count{target=~"$target",
                        identifier=~"$identifier"}[$__rate_interval])) * 100
                      instant: true
                      legendFormat: '{{target}}'
                      queryType: instant
                      range: false
