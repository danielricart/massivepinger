          version: 13.1.0-24251769778
          spec:
            options:
              colorMode: background
              graphMode: none
              justifyMode: center
              orientation: horizontal
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ''
                values: false
              showPercentChange: false
              textMode: value_and_name
              wideLayout: true
            fieldConfig:
