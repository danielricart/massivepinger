name: Test

on:
  pull_request:
    paths:
      - "**.go"
      - "**.mod"
      - "**.sum"

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Allow unprivileged ICMP
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Run tests
        run: go test ./...
