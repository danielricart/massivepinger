name: Release

on:
  release:
    types:
      - created

jobs:
  release:
    name: Test, Build, and Publish Release
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Allow unprivileged ICMP
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -o massivepinger .

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Helm lint
        run: helm lint helm-chart/

      - name: Helm template
        run: helm template massivepinger helm-chart/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push release image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --tag ghcr.io/${{ github.repository_owner }}/massivepinger:latest \
            --tag ghcr.io/${{ github.repository_owner }}/massivepinger:${{ github.event.release.tag_name }} \
            --build-arg VERSION=${{ github.event.release.tag_name }} \
            --build-arg REVISION=${{ github.sha }} \
            --build-arg CREATED=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            .
